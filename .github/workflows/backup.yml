name: Backup PostgreSQL

# C3 — Backup quotidien chiffré vers Cloudflare R2.
# Voir docs/runbooks/backup-restore.md pour le setup initial et la procédure de restauration.

on:
  schedule:
    # 03:00 UTC tous les jours (heure creuse). UTC car GH Actions ignore les TZ locales.
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: backup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backup:
    name: Dump → chiffrer GPG → upload R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Aligner pg_dump sur la version serveur Supabase (15.x au moment de la rédaction).
      # Si Supabase upgrade en 16/17, mettre à jour la version ci-dessous.
      - name: Install postgresql-client-15
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-15

      - name: Verify tools
        run: |
          pg_dump --version
          gpg --version | head -1
          aws --version

      - name: Run backup script
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BACKUP_GPG_PUBLIC_KEY: ${{ secrets.BACKUP_GPG_PUBLIC_KEY }}
        run: bash scripts/backup-database.sh
